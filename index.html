<!DOCTYPE html>
<html>
  <head>
    <title>Towncrier</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Germania+One&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <style>
      body {
        font-family: 'Germania One', sans-serif;
        background-color: #27272a;
        color: #fff;
        margin: 0;
        padding: 0;

        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .container {
        width: 90%;
        max-width: 500px;
        text-align: center;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
      }

      .reels {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 2rem 0;
      }

      .reel-outer {
        background: #18181b;
        border: 2px solid #52525b;
        border-radius: 10px;
        width: 48%;
        height: 80px;
        overflow: hidden;
        position: relative;
      }

      .reel-outer.wide {
        width: 100%;
        margin-top: 12px;
      }

      .reel-outer::before,
      .reel-outer::after {
        content: '';
        position: absolute;
        left: 0; right: 0;
        height: 22px;
        z-index: 2;
        pointer-events: none;
      }

      .reel-outer::before {
        top: 0;
        background: linear-gradient(to bottom, #18181b, transparent);
      }

      .reel-outer::after {
        bottom: 0;
        background: linear-gradient(to top, #18181b, transparent);
      }

      .reel-inner {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
      }

      .reel-item {
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        color: #fff;
        padding: 0 8px;
        text-align: center;
        line-height: 1.2;
        flex-shrink: 0;
      }

      button {
        width: 100%;
        padding: 15px;
        font-size: 1.2rem;
        font-family: 'Germania One', sans-serif;
        border-radius: 10px;
        border: none;
        background-color: #e40712;
        color: #fff;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.1s ease;
      }

      button:active {
        transform: scale(0.98);
      }

      button:hover {
        background-color: #232b2f;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      @media (min-width: 600px) {
        h1 {
          font-size: 2.5rem;
        }

        .reel-item {
          font-size: 1.4rem;
        }
      }
      
      .link-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 1rem 0;
      }

      .link {
        box-sizing: border-box;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        max-width: 180px;
        padding: 10px 14px;
        font-size: 1rem;
        font-family: 'Germania One', sans-serif;
        border-radius: 10px;
        border: 2px solid #fff;
        background-color: #000;
        color: #fff;
        cursor: pointer;
        text-decoration: none;
        transition: background-color 0.3s ease, transform 0.1s ease;
      }

      .link:hover {
        background-color: #18181b;
      }

      .link:active {
        transform: scale(0.98);
      }
      
      .section-divider {
        width: 100%;
        border: 0;
        border-top: 1px solid #52525b;
        margin: 1.5rem 0 2rem;
      }
    </style>
  </head>
  
  <body>
    <div class="container">
      <h1>Towncrier</h1>
      <div class="link-buttons">
        <a class="link" href="https://mrapplethorn.github.io/Oracle/">Oracle</a>
        <a class="link" href="https://mrapplethorn.github.io/Widowmaker/">Widowmaker</a>
      </div>
      <p class="intro-text">Did your player characters just start talking to a random NPC but you have no idea who that person is, click the "Generate NPC"-button below.</p>
      <hr class="section-divider">

      <div class="reels">
        <div class="reel-outer" id="reel-keyword">
          <div class="reel-inner" id="inner-keyword"></div>
        </div>
        <div class="reel-outer" id="reel-trait">
          <div class="reel-inner" id="inner-trait"></div>
        </div>
      </div>

      <div class="reels">
        <div class="reel-outer wide" id="reel-personal">
          <div class="reel-inner" id="inner-personal"></div>
        </div>
      </div>

      <button id="generateButton">Generate NPC</button>
    </div>

    <script>
      const traits = ["Child", "Genius", "Zealot", "Academic", "Adventurer", "Businessperson", "Criminal", "Entertainer", "Soldier", "Cultist", "Guild Member", "Politician", "Royalty", "Artist", "Counselor", "Crafter", "Dilettante", "Laborer", "Leader", "Medic", "Merchant", "Driver", "Scholar", "Scientist", "Warrior", "Wizard", "Brigand", "Con Artist", "Torturer", "Rebel", "Crime Lord", "Captain", "Judge", "Thief", "Puppet-Master", "Governor", "King", "Noble", "Priest", "Anarchist", "Conspirator", "Gang Leader", "Interrogator", "Blackmailer", "Burglar", "Shaman", "Tactician", "Prankster", "Assassin", "Busybody", "Heir", "Hunter", "Cult Leader", "Immortal", "Nurse", "Necromancer", "Theater Owner", "Ghost", "Charmer", "Acolyte", "Enforcer", "Relic Hunter", "Loner", "Pirate", "Thug", "Queen", "Recluse", "Pretender", "Former Hero", "Philanthropist", "Mascot", "Benefactor", "Spy", "Hustler", "Prostitute", "Blacksmith", "Guardian", "Librarian", "Miner", "Senator", "Purveyor", "Archivist", "Sculptor", "Patriot", "Widow", "Preacher", "Treasure Hunter", "Successor", "Innkeeper", "Mage", "Hero", "Hedge Wizard", "Farmer", "Visionary", "Bureaucrat", "Negotiator", "Investigator", "Guard", "Wanderer", "Courtier", "Constable", "General", "Sage", "Advisor", "Prodigy", "Warden", "Courier", "Smuggler", "Socialite", "Quartermaster", "Harbormaster", "Debutante", "Actor", "Seamstress", "Performer", "Surgeon", "Freedom Fighter", "Cat Burglar", "Researcher", "Reporter", "Tribesperson", "Veteran", "Healer", "Minstrel", "Spirit", "Apothecary", "Fortune Teller", "Boatman", "Witch", "Carpenter", "Gladiator", "Diviner", "Falconer", "Imposter", "Chosen One", "Lawyer", "Singer", "Fence", "Friar", "Shopkeeper", "Sheriff", "Oracle", "Seer", "Bounty Hunter", "Butler", "Trapfinder", "Weaponsmith", "Privateer", "Explorer", "Dancer", "Knight", "Prince(ss)", "Scout", "Silversmith", "Nun", "Financier", "Broker", "Patron", "Prophet"];
      const keywords = ["Hideous", "Humorous", "Impoverished", "Mysterious", "Notorious", "Power Hungry", "Saintly", "Wealthy", "Genius", "Eccentric", "Famous", "Focal", "Primal", "Religious", "Charming", "Abhorrent", "Aggressive", "Ancient", "Magical", "Beautiful", "Outdoors", "Academic", "Ambitious", "Stealthy", "Anxious", "Arrogant", "Bitter", "Bloodthirsty", "Blunt", "Bold", "Brilliant", "Calculating", "Callous", "Capricious", "Cautious", "Clever", "Corrupt", "Cowardly", "Cunning", "Curious", "Defiant", "Devoted", "Disturbed", "Dogmatic", "Enigmatic", "Fair", "Foolish", "Fussy", "Garrulous", "Greedy", "Grim", "Hedonistic", "Honorable", "Hotheaded", "Humble", "Idealistic", "Ignorant", "Impish", "Impressionable", "Incompetent", "Intense", "Intimidating", "Jaded", "Jovial", "Judgmental", "Kind", "Kinky", "Lecherous", "Lively", "Macho", "Mean", "Mild", "Miserly", "Naïve", "Noble", "Nonconformist", "Nosy", "Obedient", "Oblivious", "Oily", "Optimistic", "Passionate", "Pessimistic", "Philosophical", "Poised", "Proud", "Quaint", "Quiet", "Rakish", "Rebellious", "Remorseful", "Ruthless", "Scheming", "Sensuous", "Shady", "Sly", "Tactless", "Tough", "Unlucky", "Unpredictable", "Unscrupulous", "Weak-Willed", "Weird", "Wise"];
      const sexuality = ["Straight", "Gay/Lesbian", "Bisexual", "Asexual"];
      const gender = ["Male", "Female", "Non-Binary"];
      const relationship = ["Married", "Single", "In a Relationship"];

      const generateButton = document.getElementById("generateButton");

      function buildReel(innerEl, list, finalIndex, spinDuration) {
        // Build a long strip: lots of random items + the final one at the end
        const SPIN_COUNT = 30;
        const items = [];
        for (let i = 0; i < SPIN_COUNT; i++) {
          items.push(list[Math.floor(Math.random() * list.length)]);
        }
        items.push(list[finalIndex]);

        innerEl.innerHTML = '';
        items.forEach(text => {
          const div = document.createElement('div');
          div.className = 'reel-item';
          div.textContent = text;
          innerEl.appendChild(div);
        });

        // Start at top, animate to final item (second to last visible = last item centered)
        innerEl.style.transition = 'none';
        innerEl.style.transform = 'translateY(0)';

        const targetY = -(SPIN_COUNT * 80);

        // Force reflow before animating
        innerEl.getBoundingClientRect();

        innerEl.style.transition = `transform ${spinDuration}ms cubic-bezier(0.25, 0.1, 0.2, 1)`;
        innerEl.style.transform = `translateY(${targetY}px)`;
      }

      function buildCombinationReel(innerEl, finalSexuality, finalGender, finalRelationship, spinDuration) {
        // Create combinations of all three categories
        const combinations = [];
        const SPIN_COUNT = 30;

        // Generate random combinations for spinning
        for (let i = 0; i < SPIN_COUNT; i++) {
          const s = sexuality[Math.floor(Math.random() * sexuality.length)];
          const g = gender[Math.floor(Math.random() * gender.length)];
          const r = relationship[Math.floor(Math.random() * relationship.length)];
          combinations.push(`${s} ${g}, ${r}`);
        }
        
        // Add the final combination
        combinations.push(`${finalSexuality} ${finalGender}, ${finalRelationship}`);

        innerEl.innerHTML = '';
        combinations.forEach(text => {
          const div = document.createElement('div');
          div.className = 'reel-item';
          div.textContent = text;
          innerEl.appendChild(div);
        });

        // Start at top, animate to final item
        innerEl.style.transition = 'none';
        innerEl.style.transform = 'translateY(0)';

        const targetY = -(SPIN_COUNT * 80);

        // Force reflow before animating
        innerEl.getBoundingClientRect();

        innerEl.style.transition = `transform ${spinDuration}ms cubic-bezier(0.25, 0.1, 0.2, 1)`;
        innerEl.style.transform = `translateY(${targetY}px)`;
      }

      function spinReels() {
        generateButton.disabled = true;

        const finalTraitIndex = Math.floor(Math.random() * traits.length);
        const finalKeywordIndex = Math.floor(Math.random() * keywords.length);
        const finalSexualityIndex = Math.floor(Math.random() * sexuality.length);
        const finalGenderIndex = Math.floor(Math.random() * gender.length);
        const finalRelationshipIndex = Math.floor(Math.random() * relationship.length);

        const innerKeyword = document.getElementById('inner-keyword');
        const innerTrait = document.getElementById('inner-trait');
        const innerPersonal = document.getElementById('inner-personal');

        // Keyword reel stops first, trait reel stops a bit later, personal reel stops last
        buildReel(innerKeyword, keywords, finalKeywordIndex, 1800);
        buildReel(innerTrait, traits, finalTraitIndex, 2400);
        buildCombinationReel(innerPersonal, sexuality[finalSexualityIndex], gender[finalGenderIndex], relationship[finalRelationshipIndex], 2800);

        setTimeout(() => {
          generateButton.disabled = false;
        }, 2900);
      }

      generateButton.addEventListener("click", spinReels);

      // Show initial state on load
      (function initReels() {
        const innerKeyword = document.getElementById('inner-keyword');
        const innerTrait = document.getElementById('inner-trait');
        const innerPersonal = document.getElementById('inner-personal');

        const initialSexuality = sexuality[Math.floor(Math.random() * sexuality.length)];
        const initialGender = gender[Math.floor(Math.random() * gender.length)];
        const initialRelationship = relationship[Math.floor(Math.random() * relationship.length)];

        const keywordDiv = document.createElement('div');
        keywordDiv.className = 'reel-item';
        keywordDiv.textContent = keywords[Math.floor(Math.random() * keywords.length)];
        innerKeyword.appendChild(keywordDiv);

        const traitDiv = document.createElement('div');
        traitDiv.className = 'reel-item';
        traitDiv.textContent = traits[Math.floor(Math.random() * traits.length)];
        innerTrait.appendChild(traitDiv);

        const personalDiv = document.createElement('div');
        personalDiv.className = 'reel-item';
        personalDiv.textContent = `${initialSexuality} ${initialGender}, ${initialRelationship}`;
        innerPersonal.appendChild(personalDiv);
      })();
    </script>
  </body>
</html>
